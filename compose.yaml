# Production stack for Dockge (or any `docker compose` host).
#
# Deploy on the server:
#   1. Put this project in your Dockge stacks dir, e.g. /opt/stacks/nihongo/
#   2. In Dockge, open the "nihongo" stack and hit Deploy (it builds the image),
#      or from a shell in that folder: `docker compose up -d --build`
#   3. Browse to https://192.168.1.147:8093  (HTTPS — accept the cert warning once)
#
# HTTPS: Caddy terminates TLS on :8093 with a self-signed cert so the microphone
# works (getUserMedia needs a secure context). Edit deploy/Caddyfile to change
# the address. GPU: the `whisper` service does speech recognition on the 980ti;
# it needs the NVIDIA Container Toolkit on the host (see README). Remove the
# `whisper` service + STT_URL to run web-only.
services:
  caddy:
    image: caddy:2-alpine
    container_name: nihongo-caddy
    restart: unless-stopped
    ports:
      - "8093:8093"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data        # holds the internal CA + issued certs (persist!)
      - caddy-config:/config
    depends_on:
      - nihongo

  nihongo:
    build: .
    image: nihongo:latest
    container_name: nihongo
    restart: unless-stopped
    expose:
      - "8000"                  # internal only; Caddy publishes the host port
    volumes:
      # Review progress (SQLite) persists here across rebuilds/restarts.
      - nihongo-data:/data
    environment:
      NIHONGO_DB: /data/progress.db
      STT_URL: http://whisper:9000
    depends_on:
      - whisper

  whisper:
    # faster-whisper server on the server's RTX 3090 (Ampere, sm_86), which runs
    # CTranslate2's CUDA kernels fine (unlike the old Maxwell 980ti). Needs the
    # NVIDIA Container Toolkit on the host. If the GPU isn't available, switch the
    # image back to ":latest" and remove the `deploy:` block to fall back to CPU.
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: nihongo-whisper
    restart: unless-stopped
    environment:
      ASR_ENGINE: faster_whisper
      ASR_MODEL: medium         # 3090 has the VRAM; better Chinese/Japanese accuracy
      ASR_COMPUTE_TYPE: float16 # fast on Ampere
    volumes:
      # Cache the downloaded model so it isn't re-fetched on every restart.
      - whisper-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  nihongo-data:
  whisper-cache:
  caddy-data:
  caddy-config:
